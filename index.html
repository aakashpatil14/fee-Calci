<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fee Calculator</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h1>Fee Calculator</h1>
    <form id="feeForm">
        <label for="totalAmount">Total Amount:</label>
        <input type="number" id="totalAmount" name="totalAmount" required>

        <label for="scholarship">Scholarship Percentage:</label>
        <input type="number" id="scholarship" name="scholarship" required>

        <label for="numInstallments">Number of Installments:</label>
        <input type="number" id="numInstallments" name="numInstallments" required>

        <button type="submit">Calculate</button>
    </form>

    <div id="result"></div>

    <script>
        document.getElementById('feeForm').addEventListener('submit', function(event) {
            event.preventDefault();
            const totalAmount = parseFloat(document.getElementById('totalAmount').value);
            const scholarship = parseFloat(document.getElementById('scholarship').value);
            const numInstallments = parseInt(document.getElementById('numInstallments').value);

            const finalAmount = totalAmount - (totalAmount * (scholarship / 100));
            const installmentAmount = finalAmount / numInstallments;

            document.getElementById('result').innerHTML = `<p>Final Amount: ${finalAmount.toFixed(2)}</p><p>Installment Amount: ${installmentAmount.toFixed(2)}</p>`;
        });
    </script>
</body>
</html>
